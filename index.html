<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IncogTube</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
    }

    header {
      background: #202020;
      padding: 18px 16px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,.5);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      margin: 0;
      font-size: 1.8rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .search-bar input {
      flex: 1;
      padding: 12px 14px;
      border: none;
      border-radius: 10px;
      outline: none;
      font-size: 1rem;
    }

    .search-bar button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #ff0000;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .search-bar button:hover {
      background: #cc0000;
    }

    .note {
      color: #aaa;
      font-size: .95rem;
      margin-bottom: 18px;
      line-height: 1.5;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    .card {
      background: #1f1f1f;
      border: 1px solid #333;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 22px rgba(0,0,0,.25);
    }

    .thumb {
      width: 100%;
      display: block;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: #111;
    }

    .info {
      padding: 12px;
    }

    .title {
      font-size: 0.95rem;
      font-weight: bold;
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .channel {
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 12px;
    }

    .link {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 8px;
      background: #ff0000;
      color: white;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: bold;
    }

    .link:hover {
      background: #cc0000;
    }

    .footer {
      text-align: center;
      color: #666;
      font-size: 0.85rem;
      padding: 24px 16px 30px;
    }
  </style>
</head>
<body>
  <header>
    <h1>IncogTube</h1>
  </header>

  <main class="container">
    <div class="search-bar">
      <input id="q" type="text" placeholder="Buscar videos..." />
      <button onclick="buscarVideos()">Buscar</button>
    </div>

    <div class="note">
      Escribe una búsqueda y presiona “Buscar”. Los resultados salen desde la API oficial de YouTube.
    </div>

    <div id="results" class="grid"></div>
  </main>

  <div class="footer">
    Hecho para GitHub Pages con YouTube Data API v3
  </div>

  <script>
    const API_KEY = "TU_API_KEY_AQUI";

    async function buscarVideos() {
      const q = document.getElementById("q").value.trim();
      const results = document.getElementById("results");

      if (!q) {
        results.innerHTML = "";
        return;
      }

      results.innerHTML = "<p style='color:#aaa'>Buscando videos...</p>";

      try {
        const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=12&q=${encodeURIComponent(q)}&key=${API_KEY}`;
        const res = await fetch(url);
        const data = await res.json();

        if (data.error) {
          results.innerHTML = `<p style="color:#ff8080">Error: ${data.error.message}</p>`;
          return;
        }

        if (!data.items || data.items.length === 0) {
          results.innerHTML = "<p style='color:#aaa'>No se encontraron videos.</p>";
          return;
        }

        results.innerHTML = data.items.map(item => {
          const id = item.id.videoId;
          const title = item.snippet.title;
          const channel = item.snippet.channelTitle;
          const thumb = item.snippet.thumbnails?.medium?.url || item.snippet.thumbnails?.default?.url || "";

          return `
            <div class="card">
              <img class="thumb" src="${thumb}" alt="${title}">
              <div class="info">
                <div class="title">${title}</div>
                <div class="channel">${channel}</div>
                <a class="link" href="https://www.youtube.com/watch?v=${id}" target="_blank" rel="noopener noreferrer">
                  Ver en YouTube
                </a>
              </div>
            </div>
          `;
        }).join("");
      } catch (err) {
        results.innerHTML = `<p style="color:#ff8080">Error al cargar videos.</p>`;
      }
    }

    document.getElementById("q").addEventListener("keydown", e => {
      if (e.key === "Enter") buscarVideos();
    });
  </script>
</body>
</html>
